[mqtt_broker]
host = "localhost"
port = "1883"
vda_interface = "defaultInterface"
username = ""
password = ""

[vehicle]
serial_number = "Vehicle_"
manufacturer = "defaultManufacturer"
vda_version = "v2"
vda_full_version = "2.1.0"

[map]
enabled = true
xml_path = "maps/youle-final-4.xml"
layout_scale_mm = 1.0
layout_flip_y = false
arrival_threshold_m = 0.08
sim_dt_seconds = 0.05
# 按车队索引 0,1,… 填写初始点；名称必须存在于 plant XML；多车时应使用不同点位。
initial_point_names = ["Point_1"]
# 前缀规则含义对应 aos-backend 的 yeefungagv.plc.name-prefixes 与 aos.vda5050.map-name-prefixes。
[map.name_prefixes]
apply_stripping = true
point_prefix = "Point_"
path_prefix = "Path_"

[settings]
map_id = ""
robot_count = 1
# 车队配置：共 robot_count 台车。serial_suffix_start + robot_index
# 对应车辆序列号后缀（例如前缀 "Vehicle_" 且起始为 2，则依次为 "Vehicle_2"、"Vehicle_3"、…）。
serial_suffix_start = 2
# 将发送的 visualization JSON 记录到 logs/<serial>/visualization.log（轮转参数见下）。
log_visualization_messages = false
# 每个日志流的轮转参数：单文件最大大小，以及最大文件数（当前文件 + 备份，超出后删除最旧）。
log_max_file_bytes = 10485760
log_max_files = 10

[simulation]
state_frequency = 1
# 无事件触发时，state 消息的最大间隔（VDA 基线 30 秒）
state_max_interval_secs = 30
visualization_frequency = 1
action_time = 1.0
speed_m_s = 1.0
